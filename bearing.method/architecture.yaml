decisions:
  - id: "780ec0f2-4f65-4406-9b35-19374f10b2c2"
    title: "Accept synchronous AdviceManager to PlanningManager call as documented architectural debt"
    rationale: "The model must reflect code reality. The code performs a synchronous Manager-to-Manager call, violating
      IDesign's rule that cross-subsystem Manager communication should be queued/pub-sub for temporal decoupling.
      Surfacing this as a same-layer-call error makes it visible architectural debt to address later (introduce a
      message bus for AcceptSuggestion, or relocate apply logic to a shared component). Hiding the violation behind a
      false async=true is worse than acknowledging it; the model is now honest."
    context: "After reconciling the .method model with the actual codebase, the validator surfaces a same-layer-call error
      for uc-12 'Accept Suggestion': AdviceManager calls PlanningManager synchronously
      (am.planningManager.Establish/Revise). The previous model hid this by marking the step async=true, which was
      incorrect; there is no queue, no goroutine, no message bus."
    related_findings:
      - "same-layer-call"
    related_components:
      - "fdf81e59-7ef4-4e61-a130-e1bdab111497"
      - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
    status: "revisit"
