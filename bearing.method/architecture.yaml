  - id: "3806dfbb-98f5-4386-afd0-04e5d596866e"
    title: "Accept App-as-bootstrapper client-orchestration finding for uc-7"
    rationale: "Bootstrap (object construction at startup) is structurally different from runtime orchestration. The IDesign
      closed-layer rules apply to runtime call chains, not to one-shot wiring. The internal/bootstrap package is a
      Composition Root that App invokes once. We accept the validator findings as known-and-tolerated for uc-7 only;
      they are not present in any runtime use case."
    context: "uc-7 (Initialize System) shows App calling bootstrap.Initialize() which constructs every access component,
      every engine, and all three managers. The validator flags this as 'Client must not orchestrate' (3 managers
      called) and 'closed-layer-skip' (Client calls Resource Access and Engine layers). These findings reflect the
      bootstrap pattern, not a runtime use case."
