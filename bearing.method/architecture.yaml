    - id: "uc-1"
      name: "Manage OKR Hierarchy"
      description: "User creates, updates, records progress on, and dismisses life themes, objectives (with recursive
        nesting), key results, and routines through a single behavioral API: Establish / Revise / RecordProgress /
        Dismiss. Public surface also includes GetHierarchy, SuggestAbbreviation, status lifecycle (SetObjectiveStatus,
        SetKeyResultStatus, CloseObjective, ReopenObjective). Themes/objectives/KRs persist via ThemeAccess; routines
        persist globally via RoutineAccess (NOT theme-scoped). Includes cascading status effects (closing an objective
        auto-closes child KRs)."
      sequences:
        - name: "Establish Theme"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "Establish({goalType: 'theme', name, color})"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "Establish(EstablishRequest) — discriminates on goalType, dispatches to createTheme(name, color)"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes(), SuggestAbbreviation(name, existing), SaveTheme(theme) — ThemeAccess generates final ID via
                ensureThemeIDs()"
            - from: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(themes.json) -> Commit('Add theme NAME')"
        - name: "Establish Objective"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "Establish({goalType: 'objective', parentId, title})"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "Establish(EstablishRequest) — dispatches to createObjective(parentId, title)"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes() — Manager tree-walks to find parent theme/objective, appends new objective, SaveTheme(modifiedTheme)"
            - from: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(themes.json) -> Commit('Update theme')"
        - name: "Establish Key Result"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "Establish({goalType: 'key-result', parentObjId, description, startValue, targetValue})"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "Establish(EstablishRequest) — dispatches to createKeyResult(parentObjId, description, startValue, targetValue)"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes() — Manager validates, tree-walks to objective, appends KR, SaveTheme()"
            - from: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(themes.json) -> Commit()"
        - name: "Establish Routine (global, not theme-scoped)"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "Establish({goalType: 'routine', description, repeatPattern})"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "Establish(EstablishRequest) — dispatches to addRoutine(description, repeatPattern)"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9e7d8143-784f-44cd-bfa6-9226b03e6460"
              note: "GetRoutines(), NextRoutineID(routines), SaveRoutine(routine) — routines stored in global routines.json, NOT
                inside a theme"
            - from: "9e7d8143-784f-44cd-bfa6-9226b03e6460"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(routines.json) -> Commit('Add or Update routine')"
        - name: "Revise Goal (theme/objective/KR/routine)"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "Revise(ReviseRequest{goalId, ...fields})"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "Revise(req) — detectGoalType(goalId) -> theme | objective | key-result | routine"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes(), SaveTheme() — when goalId resolves to theme/objective/KR"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9e7d8143-784f-44cd-bfa6-9226b03e6460"
              note: "GetRoutines(), SaveRoutine() — when goalId resolves to a routine"
        - name: "RecordProgress on Key Result"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "RecordProgress(goalId, value)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "RecordProgress(goalId, value) — updates the KR's CurrentValue"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes(), find KR via tree-walk, SaveTheme(updatedTheme)"
            - from: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(themes.json) -> Commit()"
        - name: "Dismiss Goal (theme/objective/KR/routine)"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "Dismiss(goalId)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "Dismiss(goalId) — detectGoalType, removes from parent or top level"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes(), SaveTheme() — when goalId resolves to theme/objective/KR"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9e7d8143-784f-44cd-bfa6-9226b03e6460"
              note: "DeleteRoutine(id) — when goalId resolves to a routine"
        - name: "Close Objective with Cascading KR Close"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "CloseObjective(objectiveId, closingStatus, closingNotes)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "CloseObjective(objectiveId, closingStatus, closingNotes) — validates transition, sets ClosedAt + ClosingNotes,
                cascades close to child KRs"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes(), SaveTheme(updatedTheme)"
            - from: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(themes.json) -> Commit('Close objective')"
    - id: "uc-3"
      name: "Focus Daily Work"
      description: "User assigns themes, OKR IDs, and tags to calendar days to focus daily work. Calendar entries drive
        automatic task filtering on the EisenKan board. Includes copy-paste of focus entries within and across days
        (single and multi-cell), routine occurrence resolution (scheduled, overdue, sporadic), and rescheduling
        individual routine occurrences. Routines are loaded via RoutineAccess (global, not theme-scoped). Overdue
        occurrences are collapsed to a single entry per routine with MissedCount, and only emitted when date == today.
        Derived from diagrams 08, 13, 14, 17."
      sequences:
        - name: "Save Day Focus with OKR Tags"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "SaveDayFocus({date, themeIds, notes, text, okrIds, tags})"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "SaveDayFocus(access.DayFocus) — validates date non-empty"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9f3a34cd-bc21-48bd-9696-b0fc4b5e7680"
              note: "SaveDayFocus(day) — extracts year, upserts entry, sorts by date"
            - from: "9f3a34cd-bc21-48bd-9696-b0fc4b5e7680"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(calendar/{year}.json) -> Commit()"
        - name: "Today Focus Auto-Filter on EisenKan"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "GetYearFocus(currentYear)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "GetYearFocus(currentYear)"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9f3a34cd-bc21-48bd-9696-b0fc4b5e7680"
              note: "GetYearFocus(currentYear) — reads calendar/{year}.json"
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "SaveNavigationContext({selectedTag}) — on EisenKan view-mount, client reads today's focus tags from the calendar
                entry, reorders the tag-board deck so focus tags appear first (alphabetical), then non-focus tags
                (alphabetical), then `Untagged`, then `All`, renders the focus-group marker on the strip; if the user
                has no persisted board selection, defaults to the alphabetically-first focus tag's board (or `All` if
                today has no focus)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "SaveNavigationContext(ctx)"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "e2deb89f-0bcb-45c0-a973-6cb7c11a6b5f"
              note: "SaveNavigationContext(ctx) — write without git commit"
        - name: "Calendar Copy-Paste (Multi-Cell)"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "SaveDayFocus({targetDate, source.themeIds, source.text, target.notes, source.okrIds, source.tags}) — for each day
                in range"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "SaveDayFocus(access.DayFocus)"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9f3a34cd-bc21-48bd-9696-b0fc4b5e7680"
              note: "SaveDayFocus(day) — upsert, preserving target notes"
            - from: "9f3a34cd-bc21-48bd-9696-b0fc4b5e7680"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage() -> Commit() — per day in range"
        - name: "Get Routines For Date (Scheduled + Overdue + Sporadic)"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "GetRoutinesForDate(date) — queries scheduled, overdue, and sporadic routines for a calendar day"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "GetRoutinesForDate(date)"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9e7d8143-784f-44cd-bfa6-9226b03e6460"
              note: "GetRoutines() — loads ALL routines from global routines.json (NOT theme-scoped). Routine carries RepeatPattern +
                Exceptions []ScheduleException"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9f3a34cd-bc21-48bd-9696-b0fc4b5e7680"
              note: "GetYearFocus(year) — loads RoutineChecks (completion data) for the requested year"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "f1317b9d-0478-4cbb-b850-dc8139956050"
              note: "ComputeOccurrences(pattern, exceptions, date, date) per periodic routine. When date == today, also
                ComputeOverdue(pattern, exceptions, completedDates, today); the manager collapses ALL missed occurrences
                for a routine into a SINGLE entry with MissedCount = len(overdueDates). Overdue rows are only emitted
                when date == today; for past/future dates, only scheduled occurrences are emitted."
        - name: "Reschedule Routine Occurrence"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "RescheduleRoutineOccurrence(routineId, originalDate, newDate)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "RescheduleRoutineOccurrence(routineId, originalDate, newDate) — appends a ScheduleException to the routine
                without altering its base RepeatPattern"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "9e7d8143-784f-44cd-bfa6-9226b03e6460"
              note: "GetRoutines(), SaveRoutine(updated) — routine.Exceptions extended with the new {originalDate, newDate} entry"
            - from: "9e7d8143-784f-44cd-bfa6-9226b03e6460"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(routines.json) -> Commit('Reschedule routine occurrence')"
  regular:
    - id: "uc-5"
      name: "Batch Create Tasks"
