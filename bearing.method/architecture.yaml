    - id: "uc-4"
      name: "Configure Board"
      description: "User customizes the kanban board layout by adding, removing, renaming, and reordering columns. Board has
        bookend constraints (todo first, done last). Column operations manage status directories, zone keys in task
        ordering, and slug generation. Derived from diagram 07."
      sequences:
        - name: "Add Column"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "AddColumn(title, insertAfterSlug)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "a9a09c9e-ab01-4820-b677-1a01364c0392"
              note: "AddColumn(title, insertAfterSlug) — slugifies title, validates uniqueness and bookends"
            - from: "a9a09c9e-ab01-4820-b677-1a01364c0392"
              to: "df214ddd-50f0-46bf-9e31-0b752e46d174"
              note: "GetBoardConfiguration(), EnsureStatusDirectory(slug), SaveBoardConfiguration(config), CommitAll()"
            - from: "df214ddd-50f0-46bf-9e31-0b752e46d174"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage('.') -> Commit()"
        - name: "Remove Column"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "RemoveColumn(slug)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "a9a09c9e-ab01-4820-b677-1a01364c0392"
              note: "RemoveColumn(slug) — validates column exists, is doing type, has no tasks"
            - from: "a9a09c9e-ab01-4820-b677-1a01364c0392"
              to: "df214ddd-50f0-46bf-9e31-0b752e46d174"
              note: "GetTasksByStatus(slug), RemoveStatusDirectory(slug), SaveBoardConfiguration(config), CommitAll()"
            - from: "df214ddd-50f0-46bf-9e31-0b752e46d174"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage('.') -> Commit()"
        - name: "Rename Column"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "RenameColumn(oldSlug, newTitle)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "a9a09c9e-ab01-4820-b677-1a01364c0392"
              note: "RenameColumn(oldSlug, newTitle) — slugifies, validates uniqueness"
            - from: "a9a09c9e-ab01-4820-b677-1a01364c0392"
              to: "df214ddd-50f0-46bf-9e31-0b752e46d174"
              note: "RenameStatusDirectory(oldSlug, newSlug), SaveBoardConfiguration(config), CommitAll()"
            - from: "df214ddd-50f0-46bf-9e31-0b752e46d174"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage('.') -> Commit()"
    - id: "uc-7"
      name: "Initialize System"
      description: "System starts up: resolves data directory, initializes logger, creates or opens git repository, creates
        resource access components (ThemeAccess, TaskAccess, CalendarAccess, VisionAccess, UIStateAccess), creates
        PlanningManager and WorkspaceManager, and validates/repairs task order against actual files. Derived from
        diagram 12."
      sequences:
        - name: "Startup Sequence"
          steps:
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "InitializeRepositoryWithConfig(repoPath, gitConfig) — open or init git repo"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              note: "NewPlanningManager(themeAccess, taskAccess, calendarAccess, visionAccess, uiStateAccess) — creates RuleEngine,
                ProgressEngine, validates task order"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "59843c4a-d1d8-4663-abdf-6b4aa93e7099"
              note: "NewRuleEngine(DefaultRules())"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "59843c4a-d1d8-4663-abdf-6b4aa93e7099"
              note: "TodoSlugFromColumns(columns), DropZoneForTask(status, priority, todoSlug) per task,
                ReconcileTaskOrder(existingOrder, actualZone) — stateless zone computation and order reconciliation"
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "df214ddd-50f0-46bf-9e31-0b752e46d174"
              note: "GetBoardConfiguration(), GetTasksByStatus() for each column, LoadTaskOrder() — gathers data for reconciliation.
                Calls RuleEngine.TodoSlugFromColumns(), DropZoneForTask(), ReconcileTaskOrder() to compute correct zones
                and repair order. SaveTaskOrder() if repair needed."
    - id: "uc-12"
      name: "Request Goal Advice"
      description: "User requests AI-powered advice on their OKR goals through a chat panel in the OKR View. The advisor can
        review existing goals for quality, suggest new objectives/key results/routines, and evaluate OKR balance.
        Responses may include structured suggestions that the user can accept (direct-apply) or decline. Acceptance
        routes through AdviceManager to PlanningManager via async call."
      sequences:
        - name: "Request Advice (multi-turn conversation)"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "RequestAdvice(message, conversationHistory, selectedOKRIds)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              note: "RequestAdvice(message, history, selectedOKRIds) — orchestrates the advice flow"
            - from: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes() — fetch OKR data for context assembly"
            - from: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              to: "215536eb-e318-4662-8563-385bd966b502"
              note: "AssembleConversation(okrData, history, userMessage) — builds conversation payload with system prompt, OKR
                context, sanitized history"
            - from: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              to: "349b4d34-b6b2-4ee9-a662-65859068f8fa"
              note: "SendMessage(assembledMessages) — invoke Claude CLI subprocess, return response text"
            - from: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              to: "215536eb-e318-4662-8563-385bd966b502"
              note: "ParseSuggestions(responseText) — extract structured suggestion blocks, return cleanText + []Suggestion"
        - name: "Accept Suggestion (direct-apply)"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "AcceptSuggestion(suggestion, parentContext)"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              note: "AcceptSuggestion(suggestion, parentContext) — validate and route to PlanningManager"
            - from: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              to: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              async: true
              note: "CreateObjective/CreateKeyResult/AddRoutine/UpdateObjective (async call — at most one per use case). Routes based
                on suggestion.Type and suggestion.Action (create vs edit)."
            - from: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
              to: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              note: "GetThemes(), SaveTheme() — persist the new/updated OKR item"
            - from: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
              to: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
              note: "Begin() -> Stage(themes.json) -> Commit()"
        - name: "Check Model Availability"
          steps:
            - from: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
              to: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              note: "GetAvailableModels()"
            - from: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
              to: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              note: "GetAvailableModels() — delegates to ModelAccess"
            - from: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
              to: "349b4d34-b6b2-4ee9-a662-65859068f8fa"
              note: "GetAvailableModels() — checks claude binary on PATH, returns []ModelInfo with name, provider, type
                (local/remote), availability"
