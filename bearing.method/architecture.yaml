# architecture.yaml -- managed by TheAgent
# Do not edit manually. Use TheAgent MCP tools to modify.

volatilities:
  identified:
    - id: "vol-okr-hierarchy"
      name: "OKR Hierarchy Structure"
      description: "How life themes, objectives, key results, and routines are organized, nested, and related to each other.
        The tree structure, nesting depth, and entity relationships may change."
      evidence: "Same customer over time: user restructures their OKR tree as priorities evolve — adding themes, nesting
        objectives deeper, changing KR metrics. Different customers at same time: some users have flat structures (few
        themes, many KRs), others have deep hierarchies (nested objectives). Currently 6 entity types in a recursive
        tree with themes as roots."
      encapsulated_by:
        - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
      confidence: "high"
    - id: "vol-okr-lifecycle"
      name: "OKR Lifecycle and Status Transitions"
      description: "How objectives and key results move through status states (active, completed, archived) including
        validation of allowed transitions, cascading close/reopen of children, and closing metadata."
      evidence: "Same customer over time: status transition rules may become stricter or more permissive, closing workflows
        may add approval steps. Different customers at same time: some users need simple active/done, others want full
        lifecycle with closing notes. Currently validated by PlanningManager with validateOKRStatusTransition()."
      encapsulated_by:
        - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
      confidence: "high"
    - id: "vol-task-board-rules"
      name: "Task Board Rules"
      description: "Business rules governing task lifecycle on the kanban board: WIP limits, allowed column transitions, max
        task age, required fields on creation. Rules are evaluated on create, move, and update operations."
      evidence: "Same customer over time: user adjusts WIP limits, adds new transition constraints, changes max age policies.
        Different customers at same time: some users want strict WIP enforcement, others want permissive boards.
        Currently encapsulated by RuleEngine with filterApplicableRules() and
        checkWIPLimit/checkAllowedTransition/checkMaxAge."
      encapsulated_by:
        - "59843c4a-d1d8-4663-abdf-6b4aa93e7099"
      confidence: "high"
    - id: "vol-task-management"
      name: "Task Management"
      description: "How tasks are created, updated, moved between columns, deleted, archived, restored, and reordered on the
        Eisenhower-Kanban board. Includes priority-based zone assignment, batch creation from drafts, and priority
        promotion scheduling."
      evidence: "Same customer over time: task workflows evolve — new priority schemes, different archival policies, changing
        promotion rules. Different customers at same time: some users batch-create tasks, others create one at a time;
        some use priority promotions, others do not. Currently orchestrated by PlanningManager with 10+ task methods."
      encapsulated_by:
        - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
      confidence: "high"
    - id: "vol-board-configuration"
      name: "Board Configuration"
      description: "How the kanban board columns are structured: adding, removing, renaming, and reordering columns. Includes
        slug generation, bookend validation (todo must be first, done must be last), directory creation for new
        statuses, and zone migration in task ordering."
      evidence: "Same customer over time: user customizes their board layout — adds columns for review stages, renames
        columns, reorders workflow. Different customers at same time: some users want minimal todo/done, others want
        multi-stage pipelines. Currently managed by PlanningManager with 4 board config methods."
      encapsulated_by:
        - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
      confidence: "high"
    - id: "vol-calendar-focus"
      name: "Calendar Day Focus"
      description: "How daily focus entries are managed: associating days with themes, OKR IDs, tags, notes, and focus text.
        Includes year-based storage partitioning, copy-paste of focus entries within and across days, and clearing focus
        assignments."
      evidence: "Same customer over time: the fields tracked per day evolve (added okrIds and tags over time). Different
        customers at same time: some users assign themes only, others use full OKR tagging with notes. Currently managed
        by PlanningManager and PlanAccess with year-partitioned JSON files."
      encapsulated_by:
        - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
      confidence: "high"
    - id: "vol-progress-computation"
      name: "Progress Computation"
      description: "How progress is calculated for key results, objectives, and themes. KR progress is computed from
        start/current/target values. Objective progress aggregates child KR progress. Theme progress aggregates
        top-level objective progress."
      evidence: "Same customer over time: progress formulas may change (weighted averages, different rollup strategies).
        Different customers at same time: some users want simple percentage, others may want weighted or custom
        aggregation. Encapsulated by ProgressEngine with ComputeThemeProgress()."
      encapsulated_by:
        - "beed2b93-c608-4e01-a939-03483ae204a2"
      confidence: "high"
    - id: "vol-persistence-strategy"
      name: "Persistence Strategy"
      description: "How data is stored and retrieved: file-based JSON storage with git-backed versioning, directory-per-status
        organization for tasks, year-partitioned calendar files, atomic transactions via git commit. Includes ID
        generation, slug generation, and directory structure management."
      evidence: "Same customer over time: storage backend could change from file-based to database, git strategy may change.
        Different customers at same time: not applicable (single deployment). Currently encapsulated by PlanAccess and
        Repository utility, though PlanAccess also contains business logic (SuggestAbbreviation,
        DefaultBoardConfiguration) that the assessment identifies as misplaced."
      encapsulated_by:
        - "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
      confidence: "high"
    - id: "vol-ui-state-persistence"
      name: "UI State Persistence"
      description: "How transient UI state is persisted across sessions without git versioning: navigation context (current
        view, filter state, today focus active flag) and task drafts (staged tasks not yet committed to the board).
        These are pass-through operations with no business logic."
      evidence: "Same customer over time: new UI state fields are added as views evolve (todayFocusActive, filterThemeIds
        added over time). Different customers at same time: not applicable. Currently pass-through from PlanningManager
        to PlanAccess — assessment notes these are toll-booth methods adding no value at the Manager layer."
      encapsulated_by:
        - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
      confidence: "medium"
    - id: "vol-state-verification"
      name: "State Verification"
      description: "How frontend-backend state consistency is verified after mutations. The client performs optimistic
        updates, then re-fetches backend state and compares field-by-field. Mismatches trigger error banners and
        logging. Applied across all three views (OKR, EisenKan, Calendar)."
      evidence: "Same customer over time: verification strategies may change (polling, WebSocket push, conflict resolution).
        Different customers at same time: not applicable. Currently implemented entirely in the Svelte client with
        checkFullState() and checkStateFromData() utilities."
      encapsulated_by:
        - "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
      confidence: "medium"
    - id: "vol-today-focus-filtering"
      name: "Today Focus Auto-Filtering"
      description: "How the calendar day focus drives presentation on the EisenKan board. When today has a calendar entry with
        one or more focus tags, those tags form a contiguous \"focus group\" at the front of the tag-board deck
        (alphabetical within the group), are visually distinguished on the strip, and the alphabetically-first focus tag
        is the default foreground board on view-entry (unless the user has a persisted selection). Theme is no longer a
        filter axis on EisenKan."
      evidence: "Same customer over time: filter criteria may expand beyond themes and tags. Different customers at same time:
        some users rely on auto-filtering, others prefer manual control. Currently implemented in the Svelte client with
        resolveTodayFocus() and coordination between views."
      encapsulated_by:
        - "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
      confidence: "medium"
    - id: "vol-personal-vision"
      name: "Personal Vision"
      description: "How the user's personal mission and vision statements are managed. Simple CRUD with timestamp tracking.
        Serves as the root motivational context for the entire OKR hierarchy."
      evidence: "Same customer over time: vision and mission evolve as user's life direction changes. Different customers at
        same time: each user has different vision content. Currently a simple read/write through PlanningManager and
        PlanAccess to vision.json."
      encapsulated_by:
        - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
      confidence: "medium"
    - id: "vol-task-ordering"
      name: "Task Ordering"
      description: "How tasks are ordered within drop zones on the board. Tasks are organized by priority-based zones within
        columns. Order is persisted separately from tasks in task_order.json. Includes reorder operations, zone
        migration on priority change, and startup repair of stale entries. Zone computation and order reconciliation
        algorithms are encapsulated by RuleEngine; orchestration and persistence by PlanningManager."
      evidence: "Same customer over time: ordering schemes may change (manual drag-drop, auto-sort by date, priority-based
        grouping). Different customers at same time: some users manually order, others rely on defaults. Zone
        computation (DropZoneForTask, TodoSlugFromColumns) and order reconciliation (ReconcileTaskOrder) are stateless
        algorithms in RuleEngine. Orchestration and persistence managed by PlanningManager via TaskAccess."
      encapsulated_by:
        - "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
        - "59843c4a-d1d8-4663-abdf-6b4aa93e7099"
      confidence: "high"
    - id: "vol-advice-invocation"
      name: "Advice Model Invocation"
      description: "How the AI advisor is invoked to review and suggest OKR goals. Covers the invocation mechanism (Claude CLI
        subprocess, local LLM, future providers), prompt construction from OKR context, conversation history assembly,
        structured suggestion parsing, and prompt injection prevention."
      evidence: "Same customer over time: user switches between Claude CLI and a local LLM as their preferred advisor backend;
        prompt engineering evolves as model capabilities improve. Different customers at same time: some users have
        Claude CLI installed, others prefer Ollama for privacy, some opt out entirely. The invocation mechanism, prompt
        construction strategy, and response parsing are all independently volatile."
      encapsulated_by:
        - "fdf81e59-7ef4-4e61-a130-e1bdab111497"
        - "215536eb-e318-4662-8563-385bd966b502"
        - "349b4d34-b6b2-4ee9-a662-65859068f8fa"
      confidence: "high"
    - id: "vol-routine-scheduling"
      name: "Routine Scheduling and Occurrence Computation"
      description: "How routine occurrences are computed from repeat patterns (daily, weekly, monthly, yearly, selected
        weekdays), how exceptions (rescheduled single occurrences) modify the schedule, how overdue occurrences are
        determined, and how period-based completion is evaluated. The scheduling algorithm, supported repeat
        frequencies, exception handling rules, and overdue accumulation logic may all change independently."
      evidence: "Same customer over time: user changes repeat patterns as habits evolve (weekly → daily), adjusts start dates,
        reschedules individual occurrences. Different customers at same time: some users want simple daily routines,
        others want complex patterns (Mon/Wed/Fri every 2 weeks). The computation algorithm (date arithmetic, exception
        suppression, overdue aggregation) is pure activity volatility — no state, no orchestration, just rules and
        calculations."
      encapsulated_by:
        - "f1317b9d-0478-4cbb-b850-dc8139956050"
      confidence: "high"
  rejected:
    - name: "Eisenhower Priority Matrix"
      reason: "The four-quadrant Eisenhower priority model (important-urgent, important-not-urgent, not-important-urgent,
        not-important-not-urgent) is the nature of the business — it is the foundational organizing principle of the
        task board. Changing this would change the nature of the system. It would be done poorly if encapsulated."
    - name: "Theme-Objective-KR Nesting Model"
      reason: "The three-level OKR nesting (Themes contain Objectives contain Key Results) is the nature of the OKR
        methodology. While the depth of nesting varies (objectives can nest recursively), the fundamental hierarchy
        model is the core business concept. Encapsulating it away would strip the system of its identity."
    - name: "Desktop Application Platform"
      reason: "Bearing is designed as a local-first desktop application using Wails. While the UI framework could change, the
        fundamental commitment to local-first (no cloud, no server, git-backed local persistence) is a product decision,
        not a volatility. Moving to a web SaaS would be a fundamentally different product."
components:
  clients:
    - id: "f9e848e7-0b5e-4c8e-9c26-ab231c1bb172"
      name: "BearingClient"
      description: "Svelte 5 frontend application providing three views: OKRView (theme/objective/key result/routine
        management), EisenKanView (Eisenhower-Kanban task board with priority quadrants), and CalendarView (day focus
        with copy-paste). Implements optimistic UI updates with state verification, today-focus auto-filtering, batch
        task creation from drafts, and cross-view navigation coordination. Communicates with backend through Wails
        bindings (native) or mock bindings (browser testing)."
    - id: "fd554c15-5dd4-4dd2-9f19-c3c486e72684"
      name: "App"
      description: "Wails binding gateway (main.go App struct). Exposes 40+ public methods as Wails bindings for the Svelte
        frontend. Performs DTO conversion between Wails-serializable types and internal access-layer types. App.startup
        delegates startup orchestration to the bootstrap package (internal/bootstrap.Initialize), which resolves the
        data directory, sets up logging, opens or initializes the git repository, creates all access components
        (ThemeAccess, RoutineAccess, TaskAccess, CalendarAccess, VisionAccess, UIStateAccess, ModelAccess), instantiates
        engines (RuleEngine, ProgressEngine, ScheduleEngine, ChatEngine), and wires all three managers (PlanningManager,
        WorkspaceManager, AdviceManager). App stores the returned managers and exposes them through bindings. Also
        provides GetLocale() with OS-specific fallback and LogFrontend() for frontend error logging. Assessment notes:
        this is a Gateway with DTO conversion logic — that conversion is acceptable (boundary translation) but business
        decisions must not creep in here."
  managers:
    - id: "36dbcfd7-bca1-4fa3-9d04-301ae4f279f8"
      name: "PlanningManager"
      description: "Single Manager component orchestrating the OKR hierarchy, task board execution, calendar focus, routines,
        personal vision, and UI state pass-through. Public API uses a behavioral quartet — Establish / Revise /
        RecordProgress / Dismiss — that operates on themes, objectives, key results, and routines via goalType
        discrimination, plus GetHierarchy, SuggestAbbreviation, status lifecycle (SetObjectiveStatus,
        SetKeyResultStatus, CloseObjective, ReopenObjective), task ops (CreateTask, MoveTask, ArchiveTask, ReorderTasks,
        ProcessPriorityPromotions), calendar focus (SaveDayFocus, GetYearFocus, GetRoutinesForDate), vision
        (SavePersonalVision), and UI-state pass-through. Delegates progress computation to ProgressEngine, schedule
        occurrence/overdue computation to ScheduleEngine, board rule evaluation and zone/order computation to
        RuleEngine. Persists via ThemeAccess (themes), RoutineAccess (global routines), TaskAccess (tasks + board
        config), CalendarAccess (day focus), VisionAccess (mission/vision), UIStateAccess (transient UI state). Routines
        are global — RoutineAccess is the source of truth for routines.json."
    - id: "a9a09c9e-ab01-4820-b677-1a01364c0392"
      name: "WorkspaceManager"
      description: "Manager component (IWorkspaceManager) orchestrating workspace structure configuration. Encapsulates board
        column management: adding, removing, renaming, and reordering columns with bookend constraints (todo first, done
        last). Manages status directories, zone key migration in task ordering, and slug generation. 5 methods on a
        single facet. Separated from PlanningManager because workspace structure volatility (how the board is laid out)
        changes independently from planning item lifecycle volatility."
    - id: "fdf81e59-7ef4-4e61-a130-e1bdab111497"
      name: "AdviceManager"
      description: "Manager component (IAdviceManager) orchestrating AI-powered goal advisory. Operations: RequestAdvice
        (fetch OKR data via ThemeAccess, delegate prompt assembly to ChatEngine, invoke ModelAccess, return
        AdviceResponse with text and structured suggestions), GetAvailableModels (enumerate configured model providers
        with local/remote classification), GetEnabled/SetEnabled (opt-in setting via UIStateAccess), AcceptSuggestion
        (route accepted suggestions to PlanningManager via async call for direct-apply creation/update of OKR items — at
        most one async cross-manager call per use case)."
  engines:
    - id: "59843c4a-d1d8-4663-abdf-6b4aa93e7099"
      name: "RuleEngine"
      description: "Stateless engine (IRuleEngine) that evaluates board rules against task events and computes task ordering
        zones. Rule evaluation: receives TaskEvent with event type and all tasks context, filters applicable rules by
        event type, evaluates checkRequiredFields (task creation), checkWIPLimit (doing column max 20),
        checkAllowedTransition (column moves), checkMaxAge (30 days), returns RuleEvaluationResult with Allowed flag and
        Violations list. Zone computation: DropZoneForTask computes the drop zone for a task based on status, priority,
        and todo column slug. TodoSlugFromColumns extracts the todo column slug from column definitions.
        ReconcileTaskOrder repairs stored task order against actual zone assignments. Genuinely stateless — receives all
        context through parameters. Uses engine-owned DTOs (TaskData, TaskInfo, ColumnInfo) with no access-layer
        imports."
    - id: "beed2b93-c608-4e01-a939-03483ae204a2"
      name: "ProgressEngine"
      description: "Stateless engine (IProgressEngine) that computes progress metrics for the OKR hierarchy. Calculates KR
        progress from start/current/target values, objective progress as aggregate of child KR progress, and theme
        progress as aggregate of top-level objective progress. Encapsulates progress computation volatility — formulas,
        rollup strategies, and weighting may change independently from OKR structure management. Receives all data
        through parameters, produces computed results with no persistence."
    - id: "215536eb-e318-4662-8563-385bd966b502"
      name: "ChatEngine"
      description: "Stateless engine (IChatEngine) that assembles conversation payloads from OKR data and parses structured
        suggestions from model responses. AssembleConversation: constructs system prompt with OKR context (themes,
        objectives, key results, routines), applies ChatML-style prompt injection prevention, formats conversation
        history, appends new user message. ParseSuggestions: extracts bearing-suggestion JSON blocks from model output,
        returns clean display text plus typed Suggestion structs (theme/objective/key_result/routine with create/edit
        actions). Handles auto-extraction of start/target values from natural language. Stateless — all data received
        through parameters."
    - id: "f1317b9d-0478-4cbb-b850-dc8139956050"
      name: "ScheduleEngine"
      description: "Computes routine occurrences from repeat patterns, resolves rescheduling exceptions, determines overdue
        status, and evaluates period-based completion. Pure algorithmic engine — no state ownership, no orchestration."
  resource_access:
    - id: "e2deb89f-0bcb-45c0-a973-6cb7c11a6b5f"
      name: "UIStateAccess"
      description: "Resource Access component (IUIStateAccess) for persisting transient UI state and per-user toggles across
        sessions, without git versioning. Three concerns: (1) navigation context (current view, filter state, collapsed
        sections, today focus flag, calendar editor state) via Save/LoadNavigationContext; (2) task drafts (staged tasks
        not yet committed) via Save/LoadTaskDrafts; (3) advisor enabled flag (advisor on/off setting) via
        Save/LoadAdvisorEnabled. Writes plain JSON files (navigation_context.json, tasks/drafts.json, advisor.json)
        without git commit. Extracted from PlanAccess to separate transient UI state from versioned business data."
    - id: "fc2702b2-2f1f-4ec7-93f0-6fb96373258b"
      name: "ThemeAccess"
      description: "Resource Access component (IThemeAccess) for persisting planning hierarchy data. Handles theme CRUD with
        git-backed transactions via Repository. Manages themes/themes.json including ID assignment (ensureThemeIDs) for
        objectives, key results, and routines within the theme tree. Split from PlanAccess by access volatility —
        themes.json is an independent storage resource."
    - id: "df214ddd-50f0-46bf-9e31-0b752e46d174"
      name: "TaskAccess"
      description: "Resource Access component (ITaskAccess) for persisting task execution data. Handles task CRUD with
        file-per-task in status directories, task ordering (task_order.json), board configuration (board_config.json),
        status directory management, and git-backed transactions via Repository. Shared by PlanningManager (task
        operations) and WorkspaceManager (column operations). Split from PlanAccess by access volatility — tasks/**,
        task_order.json, and board_config.json form a single transactional unit."
    - id: "9f3a34cd-bc21-48bd-9696-b0fc4b5e7680"
      name: "CalendarAccess"
      description: "Resource Access component (ICalendarAccess) for persisting calendar focus data. Handles day focus CRUD
        with year-partitioned JSON files (calendar/{year}.json) and git-backed transactions via Repository. Split from
        PlanAccess by access volatility — calendar files are an independent storage resource."
    - id: "f17c7d8f-5fe8-4112-95d2-b11817b68b2b"
      name: "VisionAccess"
      description: "Resource Access component (IVisionAccess) for persisting personal vision data. Handles vision read/write
        with git-backed transactions via Repository. Manages vision.json. Split from PlanAccess by access volatility —
        vision.json is an independent storage resource."
    - id: "349b4d34-b6b2-4ee9-a662-65859068f8fa"
      name: "ModelAccess"
      description: "Resource Access component (IModelAccess) for invoking AI language models. Strategy pattern interface with
        provider-specific implementations. SendMessage: pipes assembled conversation to the model, returns response
        text. GetAvailableModels: returns 0-N ModelInfo structs with name, provider, type (local/remote), availability
        status. Initial implementation: ClaudeCLIModelAccess invokes the claude binary as a subprocess via claude
        --print with stdin/stdout piping, configurable timeout, and user-friendly error mapping. Interface supports
        future OllamaModelAccess (local) or other providers."
    - id: "9e7d8143-784f-44cd-bfa6-9226b03e6460"
      name: "RoutineAccess"
      description: "Resource Access component (IRoutineAccess) for persisting global routines. Handles routine CRUD with
        git-backed transactions via Repository. Manages routines.json — a top-level resource that is NOT theme-scoped
        (routines were hoisted out of themes). Used by both PlanningManager (routine establish/revise/dismiss,
        GetRoutinesForDate) and AdviceManager (load routines for OKR context). Operations: GetRoutines, SaveRoutine,
        DeleteRoutine, SaveRoutines (bulk)."
  resources: []
  utilities:
    - id: "c2cf5663-1b5d-4d03-954d-88c54d9d39fb"
      name: "Repository"
      description: "Git-backed versioning utility (IRepository, ITransaction). Provides ACID-like transaction semantics for
        file-based persistence: Begin() starts a transaction with canonical-path-keyed mutex, Stage() adds files to git
        index, Commit() creates a git commit with descriptive message. InitializeRepositoryWithConfig() handles
        repository initialization (open existing or init new). Serializes writes per repository path to prevent
        concurrent modification."
      type: "git-repository"
